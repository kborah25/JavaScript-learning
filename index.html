<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alert-button</title>
    <style>
        body{
            display: flex;
            justify-content:center;
            align-items: center;
            height: 100vh;
        }
        #green-button{
            background-color: rgb(38, 224, 122);
            padding: 10px;
            border: 0px solid rgba(22, 123, 67, 0.913);
        }
        
    </style>

</head>
<body>
    <button id="green-button" onclick='hello()'>Click to get popup!</button>

    <script>
        function hello(){
            alert("hello world");
        }
    </script>

</body>
</html>
